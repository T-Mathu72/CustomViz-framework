<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CustomViz — Bibliothèque DAX · SVG</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('cv-theme') || 'light');</script>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sb-logo">
      <img src="datatorii_logo.svg" class="sb-logo-mark" alt="Datatorii"/>
      <span class="sb-logo-name">CustomViz</span>
      <span class="sb-logo-badge">Beta</span>
    </a>

    <div class="sb-section">
      <div class="sb-section-label">Navigation</div>
      <a href="index.html" class="sb-nav-link active" id="sbBiblioLink">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Bibliothèque
      </a>
      <a href="submit.html" class="sb-nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        Proposer
      </a>

      <div class="sb-divider"></div>

      <div class="sb-section-label">Catégories</div>
      <div id="sbCats">
        <!-- populated by JS -->
      </div>
    </div>

    <div class="sb-footer">
      <span class="sb-footer-label">Thème</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Changer le thème">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── Page ── -->
  <div class="page-wrap">

    <header>
      <div class="header-inner">
        <button class="sb-toggle" id="sbToggle" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-search">
<input type="text" id="searchInput" placeholder="Rechercher une mesure…"/>
        </div>
        <div class="header-actions">
          <a href="submit.html" class="btn-new">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            Proposer
          </a>
        </div>
      </div>
    </header>

    <main>

      <!-- Type tabs -->
      <div class="type-tabbar" id="typeTabs">
        <button class="type-tab active" data-type="dax">
          <span class="type-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          </span>
          <span class="type-tab-label">DAX</span>
          <span class="type-tab-count" id="countDax">—</span>
        </button>
        <button class="type-tab" data-type="svg">
          <span class="type-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          </span>
          <span class="type-tab-label">SVG</span>
          <span class="type-tab-count" id="countSvg">—</span>
        </button>
        <button class="type-tab" data-type="html">
          <span class="type-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </span>
          <span class="type-tab-label">HTML</span>
          <span class="type-tab-count" id="countHtml">—</span>
        </button>
        <button class="type-tab" data-type="deneb">
          <span class="type-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          </span>
          <span class="type-tab-label">Deneb</span>
          <span class="type-tab-count" id="countDeneb">—</span>
        </button>
      </div>

      <!-- Cartes SVG (images complètes) -->
      <section id="imageSection" style="display:none">
        <div class="section-title" style="margin-bottom:1rem">Cartes SVG</div>
        <div class="img-grid" id="imageCards"></div>
      </section>

      <!-- Full library -->
      <section id="tableSection">
        <div class="library-header">
          <div class="section-title">Toutes les mesures</div>
          <div class="filters" id="filters">
            <button class="filter-btn active" data-cat="all">Toutes</button>
          </div>
        </div>
        <div class="stats-bar"><span id="countDisplay">— mesures</span></div>
        <div class="grid" id="grid">
          <div class="loading"><div class="spinner"></div><p>Chargement…</p></div>
        </div>
      </section>

    </main>
  </div><!-- /page-wrap -->

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div>
          <span class="modal-category" id="modalCategory"></span>
          <h2 id="modalName"></h2>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="svg"><span class="tab-dot"></span>Aperçu SVG</button>
        <button class="tab-btn" data-tab="dax"><span class="tab-dot"></span>Mesure DAX</button>
        <button class="tab-btn" data-tab="gen" id="tabGenBtn" style="display:none"><span class="tab-dot"></span>Générer</button>
      </div>
      <div class="tab-panel active" id="tabSvg">
        <div class="svg-preview-wrap" id="svgPreviewWrap"></div>
      </div>
      <div class="tab-panel" id="tabDax">
        <div class="code-block">
          <div class="code-header">
            <span class="code-lang"><span class="code-lang-dot"></span>DAX</span>
            <button class="copy-btn" id="copyBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copier
            </button>
          </div>
          <pre id="modalCode"></pre>
        </div>
      </div>
      <div class="tab-panel" id="tabGen">
        <div class="gen-wrap">
          <div class="gen-form" id="genForm"></div>
          <div class="gen-preview-label">Aperçu en direct</div>
          <div class="svg-preview-wrap" id="genPreviewWrap"></div>
          <button class="gen-copy-btn" id="genCopyBtn">Copier le SVG généré</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
