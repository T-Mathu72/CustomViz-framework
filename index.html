<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M Framework — Bibliothèque Power Query</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-bracket">{</span>M<span class="logo-bracket">}</span>
        <span class="logo-text">Framework</span>
      </div>
      <nav>
        <a href="index.html" class="active">Bibliothèque</a>
        <a href="admin.html" class="btn-admin">+ Ajouter</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Bibliothèque de<br/><span class="accent">Fonctions M</span></h1>
      <p>Toutes vos fonctions Power Query au même endroit. Recherchez, copiez, réutilisez.</p>
    </section>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Rechercher une fonction..." />
      </div>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">Toutes</button>
      </div>
    </div>

    <div class="stats-bar">
      <span id="countDisplay">— fonctions</span>
    </div>

    <div class="grid" id="grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Chargement des fonctions…</p>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div>
          <span class="modal-category" id="modalCategory"></span>
          <h2 id="modalName"></h2>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="code-block">
        <div class="code-header">
          <span>Power Query M</span>
          <button class="copy-btn" id="copyBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copier le code
          </button>
        </div>
        <pre id="modalCode"></pre>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
